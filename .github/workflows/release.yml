name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

env:
  PROJECT_DIR: .
  PUBLISH_DIR: bin/Release/net10.0/publish
  PLUGIN_DLL: ShiroBot.DemoPlugin.dll

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish
        run: dotnet publish "$PROJECT_DIR" --configuration Release

      - name: Upload DLL to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: ${{ env.PUBLISH_DIR }}/${{ env.PLUGIN_DLL }}
